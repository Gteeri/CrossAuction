name: CrossAuction
version: '${version}'
main: dev.crossauction.CrossAuctionPlugin
api-version: '1.21'
folia-supported: true
author: Gteeri

commands:
  auction:
    aliases: [ah, auc]
    description: Open the cross-server auction house.
  crossauction:
    aliases: [cah, cauc]
    description: CrossAuction admin management.
    permission: crossauction.admin

permissions:
  crossauction.use:
    description: Allows opening the auction house GUI.
    default: true
  crossauction.sell:
    description: Allows listing items on the auction house.
    default: true
  crossauction.sell.bypasslimit:
    description: Bypasses the max-active-listings-per-player limit.
    default: op
  crossauction.admin:
    description: Allows CrossAuction admin management commands.
    default: op
