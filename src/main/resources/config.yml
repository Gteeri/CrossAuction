# CrossAuction configuration
# IMPORTANT: every backend server in the network must point at the SAME
# database.* and redis.* target (when using MYSQL/redis for production).
# Only server-id should differ per server.

server-id: "server-1"

database:
  # SQLITE - zero-config, single local file, no external service needed.
  #   Great for quick local testing (e.g. a single Pterodactyl test server),
  #   but it is NOT cross-server: each backend server would get its own
  #   separate file, which defeats the whole point of this plugin. Only
  #   ever run SQLITE on one standalone test server.
  # MYSQL  - required for real cross-server / production use. Every backend
  #   server in the network MUST point at the exact same MySQL instance.
  type: "SQLITE"

  # Used only when type: SQLITE. Path is relative to the plugin's data folder.
  sqlite-file: "crossauction.db"

  # Used only when type: MYSQL.
  host: "127.0.0.1"
  port: 3306
  database: "crossauction"
  username: "crossauction"
  password: "change-me"
  useSSL: false
  pool-size: 10
  connection-timeout-ms: 8000

redis:
  # Only needed for cross-server pub/sub + the expiry-sweep lock. Leave this
  # false while testing on a single server with SQLITE - there's nothing to
  # synchronize yet, and the node will safely sweep independently.
  enabled: false
  host: "127.0.0.1"
  port: 6379
  password: ""
  database: 0
  channel: "crossauction:events"
  lock-key: "crossauction:lock:expiry-sweep"

economy:
  # VAULT or INTERNAL - see docs/DEPLOYMENT.md before choosing VAULT.
  provider: "INTERNAL"
  currency-symbol: "$"
  sale-tax-percent: 5.0

auction:
  max-active-listings-per-player: 10
  default-duration-minutes: 2880
  min-duration-minutes: 5
  max-duration-minutes: 10080
  min-price: 1.0
  max-price: 1000000000.0
  allow-bidding: true
  min-bid-increment-percent: 5.0
  default-min-bid-increment: 1.0
  action-cooldown-ms: 500
  expiry-sweep-interval-seconds: 30
  browse-cache-ttl-ms: 3000
  listings-per-page: 45

gui:
  title: "<dark_gray>Cross-Server Auction House"
  rows: 6

logging:
  debug: false
