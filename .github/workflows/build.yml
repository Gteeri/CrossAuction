name: Build CrossAuction

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10

      - name: Build and publish log
        shell: bash
        run: |
          set +e
          gradle build --no-daemon --stacktrace 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/ci-logs-content
          cp build.log /tmp/ci-logs-content/last-build.log
          printf "commit: %s\nrun_id: %s\nrun_attempt: %s\nexit_code: %s\n" "$GITHUB_SHA" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$BUILD_EXIT" > /tmp/ci-logs-content/last-build-info.txt

          BLOB_LOG=$(git hash-object -w /tmp/ci-logs-content/last-build.log)
          BLOB_INFO=$(git hash-object -w /tmp/ci-logs-content/last-build-info.txt)
          TREE=$(printf "100644 blob %s\tlast-build.log\n100644 blob %s\tlast-build-info.txt\n" "$BLOB_LOG" "$BLOB_INFO" | git mktree)

          git fetch origin ci-logs || true
          PARENT=$(git rev-parse --verify origin/ci-logs 2>/dev/null || echo "")
          if [ -n "$PARENT" ]; then
            COMMIT=$(echo "ci: update build log [skip ci]" | git commit-tree "$TREE" -p "$PARENT")
          else
            COMMIT=$(echo "ci: update build log [skip ci]" | git commit-tree "$TREE")
          fi
          git push origin "$COMMIT:refs/heads/ci-logs" --force

          exit $BUILD_EXIT

      - name: Upload jar artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CrossAuction-jar
          path: build/libs/*.jar
          if-no-files-found: error
